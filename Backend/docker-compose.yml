# ============================================================================
# docker-compose.yml - Orchestration des services
# ============================================================================

services:
  # Base de données PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: dzcarpool_db
    environment:
      POSTGRES_DB: ${DB_NAME:-dzcarpool_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application Django
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dzcarpool_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - media_files:/app/media
      - static_files:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432

  # Redis
  redis:
    image: redis:7-alpine
    container_name: dzcarpool_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Celery Worker
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dzcarpool_celery
    command: python -m celery -A config worker --loglevel=info
    volumes:
      - .:/app
      - media_files:/app/media
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DB_HOST=db
      - DB_PORT=5432

volumes:
  postgres_data:
    driver: local
  media_files:
    driver: local
  static_files:
    driver: local
  redis_data:
    driver: local