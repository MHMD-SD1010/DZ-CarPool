[pytest]
# Configuration Django
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*

# Paths de tests - UNIQUEMENT app.users
testpaths = app/users/tests

# Options pytest
addopts = 
    --strict-markers
    --verbose
    --tb=short
    --reuse-db
    --nomigrations
    --cov=app.users
    --cov-report=html
    --cov-report=term-missing:skip-covered
    --cov-report=xml
    --cov-fail-under=75
    -p no:warnings

# Marqueurs personnalisés
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    security: marks tests as security-related
    auth: marks tests as authentication-related
    verification: marks tests as verification-related
    documents: marks tests as document-related
    profile: marks tests as profile-related

# Options de couverture - UNIQUEMENT app.users
[coverage:run]
source = app.users
omit = 
    */migrations/*
    */tests/*
    */test_*.py
    */__init__.py
    */admin.py
    */apps.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov