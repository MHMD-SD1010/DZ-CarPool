[tool:pytest]
DJANGO_SETTINGS_MODULE = config.settings_test
testpaths = app/users/tests app/trajets/tests app/reservations/tests
python_files = test_*.py *_test.py tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --reuse-db
    --nomigrations
    --cov=app.users
    --cov=app.trajets
    --cov=app.reservations
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml

[coverage:run]
branch = True
source = app.users, app.trajets, app.reservations
omit = 
    */migrations/*
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */virtualenv/*
    */__init__.py
    */admin.py
    */apps.py
    */conftest.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    def __str__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

[coverage:html]
directory = htmlcov

[flake8]
max-line-length = 100
exclude = 
    .git,
    __pycache__,
    */migrations/*,
    venv,
    .venv,
    */static/*,
    */media/*
ignore = E203, E266, W503
max-complexity = 10

[isort]
profile = black
line_length = 100
skip = migrations, venv, .venv
known_django = django
known_first_party = app, config
sections = FUTURE,STDLIB,DJANGO,THIRDPARTY,FIRSTPARTY,LOCALFOLDER

[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
ignore_missing_imports = True