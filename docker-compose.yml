version: '3.9'

services:
  # ==========================================
  # Service PostgreSQL
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: dzcarpool_db
    environment:
      POSTGRES_DB: covoiturage
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d covoiturage"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dzcarpool_network

  # ==========================================
  # Service Backend Django
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile.dev} # utilise Dockerfile.dev par défaut, ou Dockerfile.prod si variable définie
    container_name: dzcarpool_backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - django_static:/app/staticfiles
      - django_media:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DATABASE_NAME=covoiturage
      - DATABASE_USER=admin
      - DATABASE_PASSWORD=admin123
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dzcarpool_network
    restart: unless-stopped

  # ==========================================
  # Service Frontend React
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: ${FRONTEND_DOCKERFILE:-Dockerfile.dev} # Dockerfile.dev par défaut
    container_name: dzcarpool_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
      - REACT_APP_WS_URL=ws://localhost:8000/ws
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      - backend
    networks:
      - dzcarpool_network
    stdin_open: true
    tty: true
    restart: unless-stopped

  # ==========================================
  # Service Redis (pour Celery/cache)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: dzcarpool_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dzcarpool_network
    restart: unless-stopped

  # ==========================================
  # Service Celery Worker (optionnel)
  # ==========================================
  celery:
    build:
      context: ./backend
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile.dev}
    container_name: dzcarpool_celery
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=${DEBUG:-True}
      - DATABASE_NAME=covoiturage
      - DATABASE_USER=admin
      - DATABASE_PASSWORD=admin123
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - dzcarpool_network
    restart: unless-stopped

# ==========================================
# Volumes persistants
# ==========================================
volumes:
  postgres_data:
    driver: local
  django_static:
    driver: local
  django_media:
    driver: local
  redis_data:
    driver: local

# ==========================================
# Réseau personnalisé
# ==========================================
networks:
  dzcarpool_network:
    driver: bridge
